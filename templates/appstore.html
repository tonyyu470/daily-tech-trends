<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS App Store Trending</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1350px;
  background: #000000;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  color: #ffffff;
  overflow: hidden;
}

.container {
  width: 100%;
  height: 100%;
  padding: 64px 56px 48px;
  display: flex;
  flex-direction: column;
  background: linear-gradient(180deg, #0a0a0f 0%, #0f1019 100%);
}

.header { margin-bottom: 40px; }

.header-top {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}

.apple-icon { color: #ffffff; }

.header-label {
  font-size: 13px;
  font-weight: 600;
  color: #0a84ff;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.header-title {
  font-size: 36px;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: -0.03em;
  line-height: 1.2;
}

.header-subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  margin-top: 8px;
}

.list { flex: 1; display: flex; flex-direction: column; gap: 3px; }

.item {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  align-items: center;
  gap: 16px;
  padding: 16px 16px;
  border-radius: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
}

.item:nth-child(-n+3) {
  background: rgba(10, 132, 255, 0.06);
  border-color: rgba(10, 132, 255, 0.15);
}

.rank {
  font-size: 15px;
  font-weight: 700;
  color: rgba(255,255,255,0.4);
  text-align: center;
}

.item:nth-child(-n+3) .rank { color: #0a84ff; }

.info { min-width: 0; }

.app-name {
  font-size: 15px;
  font-weight: 600;
  color: #ffffff;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app-category {
  font-size: 11.5px;
  font-weight: 500;
  color: rgba(255,255,255,0.45);
  margin-bottom: 4px;
}

.app-desc {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.velocity {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
  white-space: nowrap;
}

.velocity-change { font-size: 15px; font-weight: 700; color: #30d158; }
.item:nth-child(-n+3) .velocity-change { font-size: 16px; }
.velocity-rank { font-size: 11px; color: rgba(255,255,255,0.4); }

.insight {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 16px;
  padding: 12px 16px;
  background: rgba(10, 132, 255, 0.06);
  border-radius: 8px;
  border: 1px solid rgba(10, 132, 255, 0.12);
}

.insight-tag {
  font-size: 11px;
  font-weight: 600;
  color: #0a84ff;
  background: rgba(10, 132, 255, 0.15);
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
}

.insight-text { font-size: 13px; color: rgba(255,255,255,0.6); }

.footer {
  margin-top: 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.footer-note, .footer-source { font-size: 12px; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-top">
      <svg class="apple-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      <span class="header-label">Rank Velocity · 7 Days</span>
    </div>
    <h1 class="header-title">App Store 排名飙升榜 Top 10</h1>
    <p class="header-subtitle">{{DATE_RANGE}} · iOS US · 排名上升最快的应用</p>
  </div>

  <div class="list">
    <!-- {{ITEMS}} -->
    <!-- 模板行：
    <div class="item">
      <span class="rank">01</span>
      <div class="info">
        <div class="app-name">App Name</div>
        <div class="app-category">Category · Developer · ★ N.N</div>
        <div class="app-desc">中文描述 / English description</div>
      </div>
      <div class="velocity">
        <span class="velocity-change">+N,NNN</span>
        <span class="velocity-rank">#YYYY → #XX</span>
      </div>
    </div>
    -->
  </div>

  <div class="insight">
    <span class="insight-tag">趋势洞察</span>
    <span class="insight-text">{{INSIGHT}}</span>
  </div>

  <div class="footer">
    <span class="footer-note">data: clonechart.io · rank velocity (grossing)</span>
    <span class="footer-source">{{HANDLE}}</span>
  </div>
</div>
</body>
</html>
